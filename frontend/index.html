<html lang="fr">

    <!-- Favicon & PWA -->

    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#16479E" />

    <!-- Preconnect pour Cloudinary (LCP images/vidéos) -->
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://api.cloudinary.com" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Mur LSDJ — Une infinité d'histoires</title>
    <meta name="description" content="30 ans de souvenirs collectifs du Silence des Justes (1996–2026). Photos, vidéos et témoignages partagés par les familles, professionnels et personnes accompagnées." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mur LSDJ" />
    <meta property="og:title" content="Mur LSDJ — Une infinité d'histoires" />
    <meta property="og:description" content="30 ans de souvenirs collectifs du Silence des Justes. Photos, vidéos et témoignages des familles et professionnels." />

    <meta property="og:url" content="https://murlsdj.vercel.app" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mur LSDJ — Une infinité d'histoires" />
    <meta name="twitter:description" content="30 ans de souvenirs collectifs du Silence des Justes (1996–2026)." />
    <meta name="twitter:image" content="https://murlsdj.vercel.app/favicon.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://murlsdj.vercel.app" />

    <!-- JSON-LD Organisation -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Le Silence des Justes",
      "url": "https://murlsdj.vercel.app",
      "logo": "https://murlsdj.vercel.app/favicon.png",
      "description": "30 ans de souvenirs collectifs du Silence des Justes (1996–2026).",
      "foundingDate": "1996",
      "address": { "@type": "PostalAddress", "addressCountry": "FR" }

  </head>

    <script type="module" src="/src/main.tsx"></script>
